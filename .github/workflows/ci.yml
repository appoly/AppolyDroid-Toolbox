name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests & coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Runs Gradle/AGP; the libraries still compile to JVM 11. Must be >= 24:
          # FlexiLogger's published *-jvm artifacts are Java 24 bytecode (class-file v68),
          # which the pure-Kotlin (java-library) modules load at test time.
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `test` runs the unit tests across every module; the :app "aggregated" Kover variant
      # unions Android-library (debug) + pure-JVM module coverage into one report.
      # Pass 1 reports coverage but does not gate on it (see app/build.gradle.kts).
      - name: Run tests and generate coverage report
        run: ./gradlew test :app:koverXmlReportAggregated :app:koverHtmlReportAggregated

      - name: Upload Kover coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: app/build/reports/kover/
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
