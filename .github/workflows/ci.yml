name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests & coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21' # Runs Gradle/AGP; the libraries still compile to JVM 11.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `test` runs the unit tests across every module; the :app Kover tasks aggregate all
      # library modules' coverage and koverVerifyDebug enforces the floor.
      - name: Run tests and verify coverage
        run: ./gradlew test :app:koverXmlReportDebug :app:koverVerifyDebug

      - name: Upload Kover coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: app/build/reports/kover/
          if-no-files-found: ignore
